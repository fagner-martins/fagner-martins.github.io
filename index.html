<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Soluçôes em Técnilogias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue-light: #007BFF; --blue-deep: #020617; }
        
        body { 
            margin: 0; padding: 0; background: var(--blue-deep); 
            overflow: hidden; height: 100vh; display: flex; 
            align-items: center; justify-content: center;
        }

        /* Fundo de Água Imersivo */
        .water-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0, 123, 255, 0.2) 0%, var(--blue-deep) 100%);
            z-index: 1;
        }

        /* Bolhas de Água */
        .bubbles { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .bubble {
            position: absolute; bottom: -20px; background: rgba(255, 255, 255, 0.2);
            border-radius: 50%; animation: bubble-up infinite ease-in;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        @keyframes bubble-up {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }

        /* Definição de tamanhos e animações das bolhas */
        .bubble:nth-child(1) { width: 20px; height: 20px; left: 10%; animation-duration: 8s; animation-delay: 1s; }
        .bubble:nth-child(2) { width: 10px; height: 10px; left: 20%; animation-duration: 5s; animation-delay: 3s; }
        .bubble:nth-child(3) { width: 15px; height: 15px; left: 35%; animation-duration: 7s; animation-delay: 0s; }
        .bubble:nth-child(4) { width: 25px; height: 25px; left: 50%; animation-duration: 10s; animation-delay: 5s; }
        .bubble:nth-child(5) { width: 12px; height: 12px; left: 65%; animation-duration: 6s; animation-delay: 2s; }
        .bubble:nth-child(6) { width: 18px; height: 18px; left: 80%; animation-duration: 9s; animation-delay: 4s; }
        .bubble:nth-child(7) { width: 22px; height: 22px; left: 90%; animation-duration: 8s; animation-delay: 6s; }

        /* Card Central */
        .glass-card {
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1); position: relative;
            z-index: 10; box-shadow: 0 0 100px rgba(0, 123, 255, 0.15);
        }

        /* Logomarca Gigante e Muito Visível */
        .logo-main { 
            width: 320px; /* Aumentado consideravelmente */
            filter: drop-shadow(0 0 50px rgba(0, 123, 255, 0.8)); /* Brilho intenso */
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .typing-text {
            font-family: 'Lexend', sans-serif; color: #fff;
            text-shadow: 0 0 15px rgba(0, 123, 255, 0.9);
        }

        .btn-link {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-link:hover {
            background: rgba(0, 123, 255, 0.25); border-color: var(--blue-light);
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.5); transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="water-container">
        <div class="bubbles">
            <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
            <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>

    <main class="relative z-50 w-full max-w-lg p-6">
        <div class="glass-card rounded-[4rem] p-14 text-center">
            
            <img src="Logo-Fagner-Martins.png" alt="Logo" class="logo-main mx-auto mb-14">

            <div class="mb-14 h-10">
                <p id="typing" class="typing-text text-base font-black uppercase tracking-[0.3em] italic"></p>
            </div>

            <div class="space-y-5">
                <a href="https://wa.me/5584996312810" target="_blank" class="btn-link flex items-center gap-5 p-6 rounded-3xl w-full group">
                    <i class="fab fa-whatsapp text-green-500 text-3xl"></i>
                    <span class="text-white font-bold text-xs tracking-[0.2em]">ORÇAMENTO NO WHATSAPP</span>
                </a>

                <a href="https://github.com/fagner-martins" target="_blank" class="btn-link flex items-center gap-5 p-6 rounded-3xl w-full">
                    <i class="fab fa-github text-white text-3xl"></i>
                    <span class="text-white font-bold text-xs tracking-[0.2em]">REPOSITÓRIO GITHUB OFICIAL</span>
                </a>
            </div>

            <p class="mt-16 text-white/20 text-[9px] font-bold uppercase tracking-widest">Laravel & Filament Expert • 2026</p>
        </div>
    </main>

    <script>
        const texts = [
            "Sistemas Web de Alta Performance",
            "Desenvolvimento Laravel & Filament",
            "Sua Ideia Transformada em Código",
            "Soluções Full Stack Premium"
        ];
        let i = 0, j = 0, isDel = false;
        function type() {
            const current = texts[i];
            document.getElementById('typing').textContent = isDel ? current.substring(0, j--) : current.substring(0, j++);
            if (!isDel && j === current.length + 1) { isDel = true; setTimeout(type, 2500); }
            else if (isDel && j === 0) { isDel = false; i = (i + 1) % texts.length; setTimeout(type, 500); }
            else { setTimeout(type, isDel ? 30 : 60); }
        }
        type();
    </script>
</body>
</html>
