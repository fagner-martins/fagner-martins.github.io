<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Tech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue-light: #007BFF; --blue-deep: #020617; }
        
        body { 
            margin: 0; 
            padding: 0; 
            background: var(--blue-deep); 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* Efeito de Água Enchendo a Tela */
        .water-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%; /* Preenche a tela toda */
            background: linear-gradient(180deg, rgba(0, 123, 255, 0.15) 0%, var(--blue-deep) 100%);
            z-index: 1;
        }

        /* Ondas no topo da água */
        .wave-container {
            position: absolute;
            top: -100px; /* Ajusta para a onda aparecer no topo */
            width: 100%;
            height: 200px;
            overflow: hidden;
        }

        .wave {
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; 
            position: absolute;
            width: 6400px;
            height: 198px;
            animation: wave-move 10s linear infinite;
            filter: invert(36%) sepia(87%) saturate(2255%) hue-rotate(198deg);
            opacity: 0.3;
        }

        .wave.second {
            animation: wave-move 15s linear infinite;
            opacity: 0.1;
            top: 20px;
        }

        @keyframes wave-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-1600px); }
        }

        /* Estilo do Card Central */
        .glass-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 10;
            box-shadow: 0 0 100px rgba(0, 123, 255, 0.1);
        }

        .logo-main { 
            width: 280px;
            filter: drop-shadow(0 0 40px rgba(0, 123, 255, 0.7));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .typing-text {
            font-family: 'Lexend', sans-serif;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 123, 255, 0.8);
        }

        .btn-link {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .btn-link:hover {
            background: rgba(0, 123, 255, 0.2);
            border-color: var(--blue-light);
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="water-bg">
        <div class="wave-container">
            <div class="wave"></div>
            <div class="wave second"></div>
        </div>
    </div>

    <main class="relative z-50 w-full max-w-md p-6">
        <div class="glass-card rounded-[4rem] p-12 text-center">
            
            <img src="Logo-Fagner-Martins.png" alt="Logo" class="logo-main mx-auto mb-12">

            <div class="mb-12 h-8">
                <p id="typing" class="typing-text text-sm font-black uppercase tracking-[0.3em] italic"></p>
            </div>

            <div class="space-y-4">
                <a href="https://wa.me/5584996312810" target="_blank" class="btn-link flex items-center gap-4 p-5 rounded-3xl w-full group">
                    <i class="fab fa-whatsapp text-green-500 text-2xl"></i>
                    <span class="text-white font-bold text-[10px] tracking-[0.2em]">ORÇAMENTO NO WHATSAPP</span>
                </a>

                <a href="https://github.com/fagner-martins" target="_blank" class="btn-link flex items-center gap-4 p-5 rounded-3xl w-full">
                    <i class="fab fa-github text-white text-2xl"></i>
                    <span class="text-white font-bold text-[10px] tracking-[0.2em]">REPOSITÓRIO GITHUB</span>
                </a>
            </div>

            <p class="mt-14 text-white/20 text-[8px] font-bold uppercase tracking-widest">Laravel & Filament Expert • 2026</p>
        </div>
    </main>

    <script>
        const texts = [
            "Desenvilvimento de Lojas Virtuais"
            "Desenvolvimento de Sites"
            "Sistemas Web de Alta Performance",
            "Desenvolvimento Laravel & Filament",
            "Sua Ideia Transformada em Código",
            "Soluções Full Stack Premium"
        ];
        let i = 0, j = 0, isDel = false;
        function type() {
            const current = texts[i];
            document.getElementById('typing').textContent = isDel ? current.substring(0, j--) : current.substring(0, j++);
            if (!isDel && j === current.length + 1) { isDel = true; setTimeout(type, 2000); }
            else if (isDel && j === 0) { isDel = false; i = (i + 1) % texts.length; setTimeout(type, 500); }
            else { setTimeout(type, isDel ? 40 : 80); }
        }
        type();
    </script>
</body>
</html>
