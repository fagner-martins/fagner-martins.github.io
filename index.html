<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Desenvolvimento de Sistemas de Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --azul-glow: #007BFF; 
            --azul-neon: #00C8FF;
            --dark-depth: #020617; 
        }
        
        body { 
            background: var(--dark-depth); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* Evita barras de rolagem causadas pelas animações de fundo */
        }

        /* --- NOVO FUNDO ANIMADO COM CORES VIVAS --- */
        .bg-gradient-blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; overflow: hidden;
        }

        .fundo-mancha {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2; /* Ajuste para mais ou menos brilho no fundo */
            animation: flutuar infinite alternate-reverse ease-in-out;
        }

        .mancha-1 {
            top: -10%; left: -5%;
            width: 70vh; height: 70vh;
            background-color: var(--azul-glow);
            animation-duration: 12s;
        }

        .mancha-2 {
            bottom: -10%; right: -5%;
            width: 80vh; height: 80vh;
            background-color: var(--azul-neon);
            animation-duration: 18s;
            animation-delay: -4s;
        }

        .mancha-3 {
            top: 40%; left: 30%;
            width: 50vh; height: 50vh;
            background-color: #001A33;
            animation-duration: 25s;
        }

        @keyframes flutuar {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(60px, 40px) scale(1.1) rotate(15deg); }
            100% { transform: translate(-30px, 70px) scale(0.9) rotate(-10deg); }
        }

        /* --- PAINEL PRINCIPAL (CONTEÚDO) --- */
        .glass-panel {
            position: relative; z-index: 10;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 35px;
            width: 92%; max-width: 550px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }

        .logo-hero {
            width: 340px; margin: 0 auto 30px;
            filter: drop-shadow(0 0 25px rgba(0, 123, 255, 0.4));
            animation: floatLogo 5s ease-in-out infinite;
        }

        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .titulo-forte {
            font-size: 1.8rem; font-weight: 800; line-height: 1.2;
            background: linear-gradient(180deg, #FFFFFF 0%, #94a3b8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px; letter-spacing: -1px;
        }

        .texto-apoio {
            font-size: 0.95rem; color: #94a3b8; line-height: 1.6;
            margin-bottom: 35px;
        }

        /* GRID DE DIFERENCIAIS */
        .grid-features {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; margin-bottom: 35px;
        }

        .feature-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 15px 5px; border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.3s;
        }

        .feature-item:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); }
        .feature-item i { color: var(--azul-neon); font-size: 1.3rem; margin-bottom: 8px; }
        .feature-item span { display: block; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #e2e8f0; }

        /* BOTÕES */
        .cta-button {
            background: linear-gradient(135deg, #007BFF 0%, #0056b3 100%);
            color: white; padding: 22px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; border: none; width: 100%;
            box-shadow: 0 15px 30px rgba(0, 123, 255, 0.3);
        }

            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0
