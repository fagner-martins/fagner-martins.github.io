<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Desenvolvimento de Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #010409; overflow: hidden;
            font-family: 'Lexend', sans-serif;
        }

        /* Fundo Oceânico Dinâmico */
        .ocean {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #001a33 0%, #010409 100%);
            z-index: 1;
        }

        /* Bolhas de Água */
        .bubble {
            position: absolute; bottom: -100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; animation: rise infinite ease-in;
            z-index: 2; box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        /* Container Central */
        .content-wrapper {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            height: 100%; padding: 20px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4rem; padding: 4rem 3rem;
            width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
        }

        /* Logo com Efeito de Flutuação e Brilho */
        .logo-main {
            width: 100%; max-width: 380px; /* Logo bem visível */
            margin: 0 auto 3rem;
            filter: drop-shadow(0 0 30px rgba(0, 123, 255, 0.6));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .typing {
            color: #fff; font-weight: 900;
            text-transform: uppercase; letter-spacing: 3px;
            font-size: 1rem; min-height: 1.5rem;
            text-shadow: 0 0 20px rgba(0, 123, 255, 0.8);
        }

        /* Botões Estilo "Linktree Premium" */
        .btn {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 1.5rem 2rem;
            border-radius: 2rem; text-decoration: none;
            font-weight: 700; font-size: 0.85rem;
            transition: all 0.4s ease; margin-top: 1.2rem;
        }

        .btn:hover {
            background: rgba(0, 123, 255, 0.2);
            border-color: #007BFF;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 123, 255, 0.3);
        }

        .footer-tag {
            margin-top: 4rem; color: rgba(255, 255, 255, 0.2);
            font-size: 10px; font-weight: bold;
            letter-spacing: 4px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="ocean" id="bubbles-container"></div>

    <div class="content-wrapper">
        <div class="glass-box">
            <img src="Logo-Fagner-Martins.png" alt="Fagner Martins" class="logo-main">

            <div class="mb-12">
                <p id="typewriter" class="typing"></p>
                <div class="w-16 h-1 bg-blue-60
