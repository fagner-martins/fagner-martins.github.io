<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Desenvolvimento de Sistemas e Sites Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;600;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #007BFF; --deep: #010409; }
        
        body { 
            background: var(--deep); 
            margin: 0; padding: 0; 
            overflow: hidden; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Oceano Dinâmico */
        .ocean-world {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 10%, #001a33 0%, var(--deep) 80%);
            z-index: 1;
        }

        .bubble {
            position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; animation: float-up infinite ease-in;
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.2);
        }

        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        /* Card Principal */
        .main-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4rem;
            position: relative; z-index: 10;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        /* Logo com Brilho */
        .logo-img {
            width: 380px; position: relative; z-index: 2;
            filter: drop-shadow(0 0 30px rgba(0, 123, 255, 0.5));
            animation: floating 6s ease-in-out infinite;
        }
