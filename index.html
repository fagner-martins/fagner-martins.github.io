<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Desenvolvimento de Sistemas Profissionais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --azul-neon: #00d2ff; --azul-profundo: #001a33; --preto-abs: #020202; }
        
        body { 
            background: var(--preto-abs); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; overflow: hidden; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* Fundo com Luzes em Movimento */
        .fundo-animado {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(0, 123, 255, 0.1) 0%, transparent 40%);
            z-index: 1; animation: pulso-luz 15s infinite alternate;
        }

        @keyframes pulso-luz {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Painel de Vidro */
        .painel-principal {
            position: relative; z-index: 10;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 60px;
            width: 90%; max-width: 600px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
        }

        /* Logo com Flutuação */
        .logo-destaque {
            width: 350px; margin: 0 auto 40px;
            filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.4));
            animation: flutuar 5s ease-in-out infinite;
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Botões Estilizados */
        .botao-link {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 30px; border-radius: 25px;
            margin-bottom: 15px; color: white; text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .botao-link:hover {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--azul-neon);
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }
