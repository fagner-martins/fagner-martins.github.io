<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Full Stack Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-blue: #007BFF; --dark-bg: #030712; }
        
        body { 
            background-color: var(--dark-bg);
            margin: 0;
            overflow: hidden; /* Evita scroll por causa das ondas */
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Container das Ondas */
        .ocean { 
            height: 40%; /* Altura que a água preenche */
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            background: none;
            z-index: 1;
        }

        .wave {
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; 
            position: absolute;
            top: -198px;
            width: 6400px;
            height: 198px;
            animation: wave 7s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            transform: translate3d(0, 0, 0);
            opacity: 0.1; /* Onda de fundo mais clara */
        }

        .wave:nth-of-type(2) {
            top: -175px;
            animation: wave 7s cubic-bezier(0.36, 0.45, 0.63, 0.53) -.125s infinite, swell 7s ease -1.25s infinite;
            opacity: 0.3;
        }

        /* Estilo do Card (Z-index alto para ficar na frente da água) */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        @keyframes wave {
            0% { margin-left: 0; }
            100% { margin-left: -1600px; }
        }

        @keyframes swell {
            0%, 100% { transform: translate3d(0, -25px, 0); }
            50% { transform: translate3d(0, 5px, 0); }
        }

        .logo-glow { filter: drop-shadow(0 0 20px rgba(0, 123, 255, 0.5)); }
        
        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            background: rgba(0, 123, 255, 0.2);
            border-color: var(--main-blue);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="ocean">
        <div class="wave" style="filter: invert(36%) sepia(87%) saturate(2255%) hue-rotate(198deg) brightness(101%) contrast(105%);"></div>
        <div class="wave" style="filter: invert(20%) sepia(90%) saturate(3000%) hue-rotate(200deg) brightness(95%) contrast(110%);"></div>
    </div>

    <main class="w-full max-w-md p-6 relative z-50">
        <div class="glass-card rounded-[3.5rem] p-10 text-center shadow-2xl">
            
            <img src="Logo-Fagner-Martins.png" alt="Logo" class="w-56 mx-auto mb-10 logo-glow">

            <div class="mb-10">
                <h1 style="font-family: 'Lexend';" class="text-3xl font-black italic uppercase text-white mb-1">Fagner Martins</h1>
                <p class="text-blue-500 font-bold tracking-[0.4em] text-[10px] uppercase">Full Stack Developer</p>
            </div>

            <div class="space-y-4">
                <a href="https://wa.me/SEUNUMERO" target="_blank" class="btn-action flex items-center justify-between p-5 rounded-2xl w-full group">
                    <span class="flex items-center gap-3">
                        <i class="fab fa-whatsapp text-green-500 text-xl"></i>
                        <span class="font-bold text-xs">SOLICITAR PROJETO</span>
                    </span>
                    <i class="fas fa-chevron-right text-[10px] opacity-20 group-hover:opacity-100"></i>
                </a>

                <a href="https://github.com/fagner-martins" target="_blank" class="btn-action flex items-center justify-between p-5 rounded-2xl w-full group">
                    <span class="flex items-center gap-3">
                        <i class="fab fa-github text-white text-xl"></i>
                        <span class="font-bold text-xs">GITHUB OFICIAL</span>
                    </span>
                    <i class="fas fa-chevron-right text-[10px] opacity-20 group-hover:opacity-100"></i>
                </a>
            </div>

            <p class="mt-12 text-gray-600 text-[9px] font-bold uppercase tracking-widest">Laravel & Filament Expert • 2026</p>
        </div>
    </main>

</body>
</html>
