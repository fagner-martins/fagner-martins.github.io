    <title>Fagner Martins | Desenvolvimento de Sistemas e Sites Web</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --azul-claro: #00D2FF; 
            --azul-escuro: #001A33; 
            --fundo: #010409;
        }
        
        body { 
            background: radial-gradient(circle at 50% 50%, var(--azul-escuro) 0%, var(--fundo) 100%);
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Lexend', sans-serif;
            overflow: hidden;
        }

        /* Painel Centralizado */
        .painel-vidro {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 45px;
            padding: 60px 40px;
            width: 90%; max-width: 500px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            position: relative; z-index: 10;
        }

        .logo-principal {
            width: 300px; margin: 0 auto 35px;
            filter: drop-shadow(0 0 20px rgba(0, 123, 255, 0.3));
            animation: flutuar 5s ease-in-out infinite;
        }

        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* --- EFEITO DE ÁGUA NO NOME --- */
        .nome-agua {
            font-size: 2.3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            color: rgba(255, 255, 255, 0.1);
            display: inline-block;
            line-height: 1.2;
            cursor: default;
        }

            content: "FAGNER MARTINS";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;

            overflow: hidden;
            animation: encherAgua 5s ease-in-out infinite;
        }
