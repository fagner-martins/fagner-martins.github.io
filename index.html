<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Expert Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #007BFF; --dark: #020617; }
        
        body { 
            background: var(--dark);
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Fundo Mesh Animado */
        .mesh-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 123, 255, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 0% 0%, rgba(0, 123, 255, 0.05) 0%, transparent 30%);
            z-index: 0;
        }

        /* Sistema de Ondas Melhorado */
        .ocean { height: 35%; width: 100%; position: absolute; bottom: 0; left: 0; z-index: 1; }
        .wave {
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; 
            position: absolute; top: -198px; width: 6400px; height: 198px;
            animation: wave 12s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            opacity: 0.15;
            filter: invert(36%) sepia(87%) saturate(2255%) hue-rotate(198deg);
        }
        .wave:nth-of-type(2) {
            top: -160px;
            animation: wave 15s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            opacity: 0.1;
        }

        @keyframes wave { 0% { margin-left: 0; } 100% { margin-left: -1600px; } }

        /* Card Estilo Apple Vision */
        .glass-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
            position: relative; z-index: 10;
        }

        .logo-glow { 
            filter: drop-shadow(0 0 25px rgba(0, 123, 255, 0.4));
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn-premium {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .btn-premium:hover {
            background: rgba(0, 123, 255, 0.15);
            border-color: var(--blue);
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.3);
            transform: scale(1.02) translateY(-2px);
        }

        /* Cursor Customizado (Opcional - Remove se não gostar) */
        .cursor-glow {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.05) 0%, transparent 70%);
            position: fixed; pointer-events: none; z-index: 5;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <div class="cursor-glow" id="cursor"></div>

    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <main class="w-full max-w-md p-6 relative z-50">
        <div class="glass-card rounded-[4rem] p-12 text-center">
            
            <img src="Logo-Fagner-Martins.png" alt="Fagner Martins" class="w-60 mx-auto mb-10 logo-glow">

            <div class="mb-10">
                <h1 style="font-family: 'Lexend';" class="text-4xl font-black italic uppercase text-white tracking-tighter mb-1">
                    Fagner Martins
                </h1>
                <p id="typing" class="text-blue-500 font-bold tracking-[0.4em] text-[10px] uppercase h-4 italic"></p>
            </div>

            <div class="space-y-4">
                <a href="https://wa.me/SEUNUMERO" target="_blank" class="btn-premium flex items-center justify-between p-5 rounded-3xl w-full group">
                    <span class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-green-500/10 flex items-center justify-center">
                            <i class="fab fa-whatsapp text-green-500 text-lg"></i>
                        </div>
                        <span class="font-bold text-xs tracking-widest text-gray-200">SOLICITAR PROJETO</span>
                    </span>
                    <i class="fas fa-arrow-right text-[10px] opacity-20 group-hover:opacity-100 group-hover:translate-x-2 transition-all"></i>
                </a>

                <a href="https://github.com/fagner-martins" target="_blank" class="btn-premium flex items-center justify-between p-5 rounded-3xl w-full group">
                    <span class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center">
                            <i class="fab fa-github text-white text-lg"></i>
                        </div>
                        <span class="font-bold text-xs tracking-widest text-gray-200">PORTFÓLIO GITHUB</span>
                    </span>
                    <i class="fas fa-arrow-right text-[10px] opacity-20 group-hover:opacity-100 group-hover:translate-x-2 transition-all"></i>
                </a>
            </div>

            <div class="mt-12 flex items-center justify-center gap-2 opacity-30">
                <span class="h-[1px] w-8 bg-white"></span>
                <p class="text-[9px] font-bold uppercase tracking-[0.3em]">Laravel Specialist</p>
                <span class="h-[1px] w-8 bg-white"></span>
            </div>
        </div>
    </main>

    <script>
        // Efeito de Digitação
        const textArr = ["Full Stack Developer", "Laravel Expert", "Filament Specialist", "Solution Architect"];
        let idx = 0, charIdx = 0, isDeleting = false;
        function type() {
            const current = textArr[idx];
            document.getElementById('typing').textContent = isDeleting ? current.substring(0, charIdx--) : current.substring(0, charIdx++);
            if (!isDeleting && charIdx === current.length + 1) { isDeleting = true; setTimeout(type, 2000); }
            else if (isDeleting && charIdx === 0) { isDeleting = false; idx = (idx + 1) % textArr.length; setTimeout(type, 500); }
            else { setTimeout(type, isDeleting ? 50 : 100); }
        }
        type();

        // Cursor Glow
        document.addEventListener('mousemove', e => {
            document.getElementById('cursor').style.left = e.clientX + 'px';
            document.getElementById('cursor').style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
