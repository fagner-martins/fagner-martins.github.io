<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Desenvolvimento de Sistemas e Sites Web</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --azul-claro: #00D2FF; 
            --azul-medio: #007BFF;
            --azul-escuro: #001A33; 
            --fundo: #010409;
        }
        
        body { 
            background: radial-gradient(circle at 50% 50%, var(--azul-escuro) 0%, var(--fundo) 100%);
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Lexend', sans-serif;
        }

        .painel-vidro {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 45px;
            padding: 60px 40px;
            width: 90%; max-width: 500px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .logo-principal {
            width: 280px; margin: 0 auto 30px;
            filter: drop-shadow(0 0 15px rgba(0, 123, 255, 0.4));
            animation: flutuar 5s ease-in-out infinite;
        }

        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- NOVO EFEITO LÍQUIDO SEGURO --- */
        .nome-agua {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Gradiente que simula a água */
            background: linear-gradient(
                to bottom, 
                rgba(255,255,255,0.1) 40%, 
                var(--azul-claro) 50%, 
                var(--azul-medio) 100%
            );
            background-size: 200% 200%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: ondas 4s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes ondas {
            0%, 100% { background-position: 50% 100%; }
            50% { background-position: 50% 10%; } /* Faz a cor "subir" e "descer" */
        }

        .botao-acao {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 20px; border-radius: 20px;
            text-decoration: none; font-weight: 800; text-transform: uppercase;
            font-size: 0.85rem; transition: 0.4s;
            margin-top: 15px;
        }

        .botao-acao:hover { 
            background: rgba(0, 123, 255, 0.2); 
            border-color: var(--azul-claro); 
            transform: scale(1.02);
        }

        .subtitulo {
            color: #94a3b8;
            font-size: 0.95rem;
            margin: 15px 0 35px;
        }
    </style>
</head>
<body>

    <main class="painel-vidro">
        <img src="Logo-Fagner-Martins.png" alt="Fagner Martins" class="logo-principal">

        <div>
            <h1 class="nome-agua">Fagner Martins</h1>
        </div>

        <p class="subtitulo">
            Desenvolvimento de <span style="color: var(--azul-claro); font-weight: 700;">Sistemas e Sites Web</span>
        </p>

        <div class="flex flex-col">
            <a href="https://wa.me/5584996312810" target="_blank" class="botao-acao">
                <i class="fab fa-whatsapp text-green-500 text-2xl"></i>
                Solicitar Orçamento
            </a>

            <a href="https://github.com/fagner-martins" target="_blank" class="botao-acao">
                <i class="fab fa-github text-white text-2xl"></i>
                Ver Repositórios
            </a>
        </div>

        <footer class="mt-12 opacity-20 text-[10px] uppercase tracking-[5px] font-bold">
            Sistemas Inteligentes
        </footer>
    </main>

</body>
</html>
