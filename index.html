<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Sistemas e Sites Web</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --azul-marca: #00D2FF; 
            --azul-profundo: #001A33; 
            --preto-fundo: #050505;
        }
        
        body { 
            background: radial-gradient(circle at 50% 50%, var(--azul-profundo) 0%, var(--preto-fundo) 100%);
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Efeito de Luz que segue o Mouse */
        .mouse-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle 500px at var(--x, 50%) var(--y, 50%), rgba(0, 210, 255, 0.12), transparent 70%);
            z-index: 1; pointer-events: none;
        }

        /* Painel Centralizado */
        .card-principal {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 60px 40px; /* Aumentado padding superior */
            width: 90%; max-width: 550px; /* Aumentada largura máxima do card */
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            position: relative; z-index: 10;
        }

        /* LOGO AUMENTADA E COM MAIS DESTAQUE */
        .logo-destaque {
            width: 400px; /* Aumentado de 320px para 400px */
            margin: 0 auto 50px; /* Mais espaço abaixo da logo */
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.5)); /* Brilho mais intenso */
            animation: flutuar 5s ease-in-out infinite;
            display: block;
        }

        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* NOME COM EFEITO DE ÁGUA */
        .nome-agua {
            font-size: 2.7rem; /* Levemente aumentado */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            color: rgba(255, 255, 255, 0.1);
            display: inline-block;
            margin-bottom: 5px;
        }

        .nome-agua::before {
            content: "FAGNER MARTINS";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            color: var(--azul-marca);
            overflow: hidden;
            animation: encherAgua 5s ease-in-out infinite;
        }

        @keyframes encherAgua {
            0%, 100% { clip-path: polygon(0% 100%, 100% 100%, 100% 100%, 0% 100%); }
            50% { clip-path: polygon(0% 45%, 15% 40%, 35% 45%, 55% 50%, 75% 48%, 90% 42%, 100% 45%, 100% 100%, 0% 100%); }
        }

        .subtitulo {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 45px;
            letter-spacing: 1px;
        }

        /* Botões de Ação */
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 22px; /* Aumentado padding */
            border-radius: 20px;
            text-decoration: none; font-weight: 700; text-transform: uppercase;
            font-size: 0.9rem; transition: 0.4s;
            margin-bottom: 18px;
        }

        .btn:hover { 
            background: rgba(0, 210, 255, 0.1); 
            border-color: var(--azul-marca); 
            transform: translateY(-4px); /* Mais movimento no hover */
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.25);
        }

        footer {
            margin-top: 50px;
            opacity: 0.25;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="mouse-glow" id="glow"></div>

    <main class="card-principal">
        <img src="Logo-Fagner-Martins.png" alt="Fagner Martins Logo" class="logo-destaque">

        <div class="flex justify-center">
            <h1 class="nome-agua">Fagner Martins</h1>
        </div>

        <p class="subtitulo">
            Desenvolvimento de <span style="color: var(--azul-marca); font-weight: 700;">Sistemas e Sites Web</span>
        </p>

        <div class="flex flex-col">
            <a href="https://wa.me/5584996312810?text=Olá+Fagner,+gostaria+de+um+orçamento+para+um+projeto." target="_blank" class="btn">
                <i class="fab fa-whatsapp text-green-500 text-3xl"></i>
                Solicitar Orçamento
            </a>

            <a href="https://github.com/fagner-martins" target="_blank" class="btn">
                <i class="fab fa-github text-white text-3xl"></i>
                Ver Repositórios
            </a>
        </div>

        <footer>
            Sistemas Inteligentes • Fagner Martins
        </footer>
    </main>

    <script>
        // Lógica do rastro de luz do mouse
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            glow.style.setProperty('--x', x + '%');
            glow.style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
