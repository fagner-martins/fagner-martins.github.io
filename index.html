<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Desenvolvimento de Sistemas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Fundo com animação de grade tecnológica */
        body {
            background-color: #050505;
            background-image: linear-gradient(0deg, transparent 24%, rgba(0, 123, 255, .05) 25%, rgba(0, 123, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 123, 255, .05) 75%, rgba(0, 123, 255, .05) 76%, transparent 77%, transparent), 
                              linear-gradient(90deg, transparent 24%, rgba(0, 123, 255, .05) 25%, rgba(0, 123, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 123, 255, .05) 75%, rgba(0, 123, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Brilho de fundo que segue o movimento */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 123, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(-10%, -10%); }
            100% { transform: scale(1.2) translate(10%, 10%); }
        }

        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* Estilo da Logo */
        .logo-img {
            max-width: 400px;
            margin: 0 auto 40px;
            filter: drop-shadow(0 0 20px rgba(0, 123, 255, 0.4));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Botões Estilo Glassmorphism Puro */
        .nav-button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-button:hover {
            background: rgba(0, 123, 255, 0.1);
            border-color: #007bff;
            transform: translateX(10px);
            box-shadow: -10px 0 20px rgba(0, 123, 255, 0.2);
        }

        .tagline {
            font-size: 0.8rem;
            color: #007bff;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <main class="main-container">
        <img src="Logo-Fagner-Martins.png" alt="Fagner Martins" class="logo-img">

        <p class="tagline">Arquitetura de Sistemas Web</p>
        
        <div class="flex flex-col gap-2">
            <a href="https://wa.me/5599999999999" target="_blank" class="nav-button">
                <span><i class="fab fa-whatsapp mr-4 text-green-500"></i> Solicitar Orçamento</span>
                <i class="fas fa-chevron-right text-xs opacity-50"></i>
            </a>

            <a href="https://github.com/fagner-martins" target="_blank" class="nav-button">
                <span><i class="fab fa-github mr-4"></i> Ver Repositórios</span>
                <i class="fas fa-chevron-right text-xs opacity-50"></i>
            </a>
        </div>

        <p class="mt-12 text-[10px] opacity-30 tracking-[3px] uppercase">
            Laravel • Filament • Alta Performance • 2026
        </p>
    </main>

</body>
</html>
