<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Sistemas Web de Alta Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* FUNDO VIVO QUE SE MOVIMENTA */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Gradiente animado com cores vivas */
            background: linear-gradient(-45deg, #020617, #001e3c, #007BFF, #00C8FF);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CARD CENTRALIZADO */
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 50px 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .logo-img {
            width: 280px;
            margin: 0 auto 25px;
            filter: drop-shadow(0 0 15px rgba(0, 200, 255, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* TEXTOS E COPY */
        .headline {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        .subheadline {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* BOTÃO WHATSAPP */
        .btn-whatsapp {
            background: #25d366;
            color: #fff;
            padding: 18px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.5);
        }

        .btn-github {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-github:hover { color: #fff; }

        /* DESTAQUES */
        .badge-status {
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

        <div class="badge-status">
            ● Disponível para Novos Sistemas
        </div>
