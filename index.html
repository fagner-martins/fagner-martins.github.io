<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fagner Martins | Tech Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #007BFF; --dark: #020617; }
        body { background: var(--dark); margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* Fundo Animado */
        .ocean { height: 40%; width: 100%; position: absolute; bottom: 0; left: 0; z-index: 1; opacity: 0.3; }
        .wave {
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg') repeat-x; 
            position: absolute; top: -198px; width: 6400px; height: 198px;
            animation: wave 12s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            filter: invert(36%) sepia(87%) saturate(2255%) hue-rotate(198deg);
        }
        @keyframes wave { 0% { margin-left: 0; } 100% { margin-left: -1600px; } }

        /* Card Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative; z-index: 10;
        }

        /* Logo Ultra Visível */
        .logo-main { 
            width: 85%; /* Logo bem maior */
            max-width: 320px;
            margin: 0 auto;
            filter: drop-shadow(0 0 35px rgba(0, 123, 255, 0.6));
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.02); } }

        /* Texto de Digitação */
        .typing-container {
            font-family: 'Lexend', sans-serif;
            min-height: 24px;
            background: linear-gradient(90deg, #fff, var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-premium {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
        }
        .btn-premium:hover {
            background: rgba(0, 123, 255, 0.15);
            border-color: var(--blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 123, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="ocean"><div class="wave"></div></div>

    <main class="w-full max-w-lg p-6 relative z-50">
        <div class="glass-card rounded-[4rem] p-12 text-center shadow-2xl shadow-blue-900/20">
            
            <div class="mb-14">
                <img src="Logo-Fagner-Martins.png" alt="Fagner Martins" class="logo-main">
            </div>

            <div class="mb-14">
                <p id="typing" class="typing-container text-lg font-black uppercase tracking-[0.2em] italic"></p>
                <div class="h-[2px] w-12 bg-blue-600 mx-auto mt-4 opacity-50"></div>
            </div>

            <div class="space-y-4">
                <a href="https://wa.me/55DDD9XXXXXXXX" target="_blank" class="btn-premium flex items-center justify-between p-6 rounded-[2rem] w-full group">
                    <span class="flex items-center gap-4 text-white font-bold text-xs tracking-widest">
                        <i class="fab fa-whatsapp text-green-500 text-xl"></i> SOLICITAR ORÇAMENTO
                    </span>
                    <i class="fas fa-arrow-right text-[10px] text-blue-500 opacity-0 group-hover:opacity-100 group-hover:translate-x-2 transition-all"></i>
                </a>

                <a href="https://github.com/fagner-martins" target="_blank" class="btn-premium flex items-center justify-between p-6 rounded-[2rem] w-full group">
                    <span class="flex items-center gap-4 text-white font-bold text-xs tracking-widest">
                        <i class="fab fa-github text-xl"></i> PORTFÓLIO GITHUB
                    </span>
                    <i class="fas fa-arrow-right text-[10px] text-blue-500 opacity-0 group-hover:opacity-100 group-hover:translate-x-2 transition-all"></i>
                </a>
            </div>

            <p class="mt-12 text-gray-600 text-[8px] font-bold uppercase tracking-[0.4em]">Expert Laravel & Filament • 2026</p>
        </div>
    </main>

    <script>
        const textArr = [
            "Soluções Inteligentes", 
            "Sistemas Sob Medida", 
            "Laravel & Filament Expert", 
            "Arquitetura de Software",
            "Sua Ideia, Meu Código"
        ];
        let idx = 0, charIdx = 0, isDeleting = false;
        function type() {
            const current = textArr[idx];
            const display = isDeleting ? current.substring(0, charIdx--) : current.substring(0, charIdx++);
            document.getElementById('typing').textContent = display;
            
            if (!isDeleting && charIdx === current.length + 1) { 
                isDeleting = true; setTimeout(type, 2000); 
            } else if (isDeleting && charIdx === 0) { 
                isDeleting = false; idx = (idx + 1) % textArr.length; setTimeout(type, 500); 
            } else { 
                setTimeout(type, isDeleting ? 40 : 80); 
            }
        }
        type();
    </script>
</body>
</html>
